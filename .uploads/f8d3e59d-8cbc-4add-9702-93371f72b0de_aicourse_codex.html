<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>课程开发</title>
  <link rel="stylesheet" href="../shared/design-tokens.css">
  <link rel="stylesheet" href="../shared/components.css">
  <link rel="stylesheet" href="../shared/patterns.css">
  <link rel="stylesheet" href="../shared/nav.css">
  <link rel="stylesheet" href="../shared/shell.css">
  <style>
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      overflow:hidden;background:var(--color-sidebar);color:var(--color-text-1);
      font-family:var(--font-family);font-size:var(--font-base);line-height:var(--line-height-normal);
      -webkit-font-smoothing:antialiased;
    }
    button,input,select,textarea{font:inherit}
    button{cursor:pointer;border:0;background:transparent}

    .app{height:100vh;min-width:1180px;display:flex;padding:var(--space-2) var(--space-2) 0 0}

    /* 管理端导航外壳 — 复用 nav.css */
    .sidebar{width:var(--sidebar-width);flex:0 0 var(--sidebar-width);display:flex;flex-direction:column;color:var(--color-text-white)}
    .brand{height:72px;padding:var(--space-4) var(--space-3);display:flex;align-items:center;gap:var(--space-2)}
    .logo{
      width:40px;height:40px;flex:0 0 40px;border-radius:50%;display:grid;place-items:center;
      color:var(--color-sidebar);background:var(--color-bg-1);
      font-family:serif;font-weight:var(--font-weight-bold);font-size:var(--font-lg);
    }
    .brand-copy{min-width:0;display:flex;flex-direction:column;line-height:1.4}
    .brand-copy b,.brand-copy span{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .brand-copy b{font-size:var(--font-base);font-weight:var(--font-weight-semibold);color:var(--color-text-white)}
    .brand-copy span{font-size:var(--font-sm);color:var(--color-sidebar-text)}
    .collapse{margin-left:auto;display:grid;place-items:center;width:30px;height:30px;color:var(--color-sidebar-text)}
    .collapse:hover{background:var(--color-sidebar-hover);color:var(--color-text-white);border-radius:var(--radius-sm)}
    .collapse svg{width:18px;height:18px}
    .nav{min-height:0;flex:1;padding:var(--space-1) var(--space-2) var(--space-3);overflow:auto}
    .nav::-webkit-scrollbar{width:0}
    .nav-item{
      min-height:40px;margin-bottom:var(--space-1);padding:0 var(--space-3);border-radius:var(--radius-sm);
      display:flex;align-items:center;gap:var(--space-3);color:var(--color-sidebar-text);
      font-size:var(--font-base);font-weight:var(--font-weight-medium);
      transition:background var(--transition-fast),color var(--transition-fast);cursor:pointer;
    }
    .nav-item:hover,.nav-item.active{background:var(--color-sidebar-active);color:var(--color-text-white)}
    .nav-icon{width:18px;height:18px;flex:0 0 18px;display:inline-flex;align-items:center;justify-content:center}
    .nav-icon svg{display:block;width:100%;height:100%}
    .caret{margin-left:auto;width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;transition:transform var(--transition-fast)}
    .caret svg{width:100%;height:100%}
    .subnav{margin:-2px 0 var(--space-2);padding-left:42px;color:var(--color-sidebar-text)}
    .subnav div{padding:var(--space-2) var(--space-3);border-radius:var(--radius-sm);font-size:var(--font-md)}
    .subnav .selected{background:var(--color-sidebar-active);color:var(--color-text-white);font-weight:var(--font-weight-semibold)}
    .user{
      margin:var(--space-2) var(--space-3) var(--space-3);padding-top:var(--space-3);
      border-top:1px solid var(--color-sidebar-soft);
      display:flex;align-items:center;gap:var(--space-2);
    }
    .avatar{
      width:34px;height:34px;border-radius:50%;display:grid;place-items:center;
      color:var(--color-sidebar);background:var(--color-text-white);font-weight:var(--font-weight-bold);font-size:var(--font-sm);
    }
    .user b{font-size:var(--font-base);font-weight:var(--font-weight-semibold);color:var(--color-text-white)}
    .user small{display:block;color:var(--color-sidebar-text);font-size:var(--font-sm)}

    /* 主页面 */
    .main{
      min-width:0;flex:1;position:relative;overflow:auto;background:var(--color-bg-1);
      border-radius:var(--radius-lg) var(--radius-lg) 0 0;
    }
    .topbar{
      height:64px;padding:0 var(--space-8);position:sticky;top:0;z-index:10;
      display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
      border-bottom:1px solid var(--color-border-light);background:rgba(255,255,255,.96);
      backdrop-filter:blur(10px);
    }
    .back{
      display:inline-flex;align-items:center;gap:var(--space-1);
      width:max-content;height:32px;padding:0 var(--space-3);
      border:1px solid var(--color-border);border-radius:var(--radius-sm);
      background:var(--color-bg-1);color:var(--color-text-2);font-size:var(--font-md);
      transition:background var(--transition-fast),border-color var(--transition-fast);
    }
    .back:hover{background:var(--color-bg-2);border-color:var(--color-primary-border)}
    .back svg{width:14px;height:14px}
    .business-tabs{display:flex;gap:44px;height:100%;align-items:center}
    .business-tab{
      height:100%;position:relative;border:0;background:transparent;
      color:var(--color-text-2);font-size:var(--font-lg);font-weight:var(--font-weight-semibold);
    }
    .business-tab.active{color:var(--color-text-1)}
    .business-tab.active:after{
      content:"";position:absolute;left:0;right:0;bottom:12px;height:2px;
      border-radius:2px;background:var(--color-text-1);
    }
    .step{justify-self:end;color:var(--color-text-3);font-size:var(--font-sm)}
    .stage{
      width:min(1080px,calc(100% - 56px));margin:0 auto;padding:var(--space-10) 0 145px;
    }

    /* 中心引导 */
    .hero{text-align:center;margin-bottom:var(--space-6)}
    .hero h1{margin:0 0 var(--space-2);font-size:var(--font-page-title);line-height:var(--line-page-title);font-weight:var(--font-weight-semibold);letter-spacing:.2px;color:var(--color-text-1)}
    .hero p{margin:0;color:var(--color-text-3);font-size:var(--font-body);line-height:var(--line-body)}
    .scope-tabs{
      width:max-content;margin:var(--space-5) auto 0;padding:3px;display:flex;gap:3px;
      border-radius:var(--radius-sm);background:var(--color-bg-2);
    }
    .scope{
      min-width:116px;height:32px;border:0;border-radius:var(--radius-xs);background:transparent;
      color:var(--color-text-2);font-size:var(--font-md);font-weight:var(--font-weight-medium);
      transition:all var(--transition-fast);
    }
    .scope.active{
      background:var(--color-bg-1);color:var(--color-primary);font-weight:var(--font-weight-semibold);
      box-shadow:var(--shadow-sm);
    }

    .section{margin-top:var(--space-6)}
    .section-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:var(--space-3)}
    .section-head h2{margin:0;font-size:var(--font-section-title);font-weight:var(--font-weight-semibold);color:var(--color-text-1);line-height:var(--line-section-title)}
    .section-head p{margin:var(--space-1) 0 0;color:var(--color-text-3);font-size:var(--font-caption);line-height:var(--line-caption)}
    .selection-note{color:var(--color-primary);font-size:var(--font-caption)}

    /* 课程类型：紧凑选择卡 */
    .type-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:var(--space-2)}
    .type-card{
      min-height:48px;padding:var(--space-2) var(--space-3);position:relative;
      display:flex;align-items:center;gap:var(--space-2);text-align:left;
      border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-bg-1);
      transition:all var(--transition-fast);
    }
    .type-card:hover{border-color:var(--color-primary-border);background:var(--color-primary-bg)}
    .type-card.active{
      border-color:var(--color-primary);background:var(--color-primary-bg);
    }
    .type-icon{
      width:26px;height:26px;flex:0 0 26px;border-radius:var(--radius-xs);display:grid;place-items:center;
      color:var(--color-primary);background:var(--color-primary-bg);font-size:var(--font-xs);font-weight:var(--font-weight-bold);
    }
    .type-text{min-width:0}
    .type-text strong{display:block;font-size:var(--font-base);color:var(--color-text-1)}
    .type-text small{display:none}
    .type-state{
      margin-left:auto;width:17px;height:17px;flex:0 0 17px;border:1px solid var(--color-border-strong);
      border-radius:50%;display:grid;place-items:center;color:transparent;
    }
    .type-state svg{display:none;width:11px;height:11px}
    .type-card.active .type-state{border-color:var(--color-primary);background:var(--color-primary);color:var(--color-text-white)}
    .type-card.active .type-state svg{display:block}
    .type-role{
      display:none;position:absolute;right:var(--space-2);top:7px;padding:2px var(--space-2);border-radius:var(--radius-pill);
      background:var(--color-primary-bg);color:var(--color-primary);font-size:var(--font-xs);
    }
    .type-card.primary .type-role{display:block}

    /* 专项 / 纵向信息 */
    .brief{
      display:none;margin-top:var(--space-3);padding:var(--space-4);border:1px solid var(--color-border);
      border-radius:var(--radius-md);background:var(--color-bg-3);
    }
    .brief.show{display:block}
    .brief-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-3)}
    .brief-title b{font-size:var(--font-md);color:var(--color-text-1)}
    .brief-title span{color:var(--color-text-3);font-size:var(--font-xs)}
    .brief-grid{display:grid;grid-template-columns:1fr 1fr .7fr 1.4fr;gap:var(--space-3)}
    .field label{display:block;margin-bottom:var(--space-1);color:var(--color-text-2);font-size:var(--font-xs)}
    .field input,.field select{
      width:100%;height:36px;padding:0 var(--space-3);border:1px solid var(--color-border);
      border-radius:var(--radius-sm);outline:0;background:var(--color-bg-1);color:var(--color-text-1);
      font-size:var(--font-md);transition:border-color var(--transition-fast),box-shadow var(--transition-fast);
    }
    .field input:focus,.field select:focus{border-color:var(--color-primary);box-shadow:var(--shadow-focus)}

    /* 教学框架模板 */
    .framework-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:var(--space-4) var(--space-5)}
    .framework{
      height:144px;padding:0;position:relative;overflow:hidden;text-align:left;
      border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-bg-1);
      transition:border-color var(--transition-fast),box-shadow var(--transition-fast);
    }
    .framework:hover{border-color:var(--color-primary-border);box-shadow:var(--shadow-sm)}
    .framework.active{
      border:2px solid var(--color-primary);box-shadow:0 0 0 3px rgba(23,88,152,.06);
    }
    .framework-preview{height:91px;padding:var(--space-4);position:relative;background:var(--color-primary-bg)}
    .framework:nth-child(2) .framework-preview{background:var(--color-success-bg)}
    .framework:nth-child(3) .framework-preview{background:var(--color-purple-bg)}
    .framework:nth-child(4) .framework-preview{background:var(--color-cyan-bg)}
    .framework:nth-child(5) .framework-preview{background:var(--color-warning-bg)}
    .framework:nth-child(6) .framework-preview{background:var(--color-bg-3)}
    .framework-code{color:var(--color-primary);font-size:var(--font-2xl);font-weight:var(--font-weight-bold);letter-spacing:.3px}
    .framework-sub{color:var(--color-text-2);font-size:var(--font-xs)}
    .flow{position:absolute;left:var(--space-4);right:var(--space-4);bottom:13px;display:flex;gap:5px}
    .flow i{height:7px;flex:1;border-radius:3px;background:var(--color-primary-border)}
    .flow i:nth-child(2n){background:var(--color-primary-disabled)}
    .flow i:nth-child(3n){background:var(--color-primary-bg-hover)}
    .dots{position:absolute;right:var(--space-4);bottom:12px;display:flex;gap:5px}
    .dots i{width:24px;height:24px;border-radius:50%;background:var(--color-success-border)}
    .tiles{position:absolute;right:var(--space-4);bottom:12px;display:grid;grid-template-columns:repeat(2,24px);gap:4px}
    .tiles i{height:22px;border-radius:var(--radius-xs);background:var(--color-purple-border)}
    .framework-meta{
      height:53px;padding:var(--space-2) var(--space-3);display:flex;align-items:center;justify-content:space-between;
      border-top:1px solid var(--color-border-light);
    }
    .framework-meta strong{display:block;font-size:var(--font-md);color:var(--color-text-1)}
    .framework-meta small{display:block;color:var(--color-text-3);font-size:var(--font-xs)}
    .framework-check{
      display:none;width:20px;height:20px;border-radius:50%;place-items:center;
      color:var(--color-text-white);background:var(--color-primary);
    }
    .framework-check svg{width:12px;height:12px}
    .framework.active .framework-check{display:grid}
    .badge{
      position:absolute;right:10px;top:9px;z-index:2;padding:2px var(--space-2);border-radius:var(--radius-pill);
      border:1px solid var(--color-primary-border);background:rgba(255,255,255,.88);
      color:var(--color-primary);font-size:var(--font-xs);
    }

    /* 底部对话 */
    .composer-shell{
      position:fixed;left:var(--sidebar-width);right:var(--space-2);bottom:0;z-index:12;padding:30px var(--space-8) var(--space-5);
      background:linear-gradient(to bottom,rgba(255,255,255,0),var(--color-bg-1) 40%);
    }
    .file-chip{
      display:none;width:min(1040px,calc(100% - 56px));margin:0 auto var(--space-2);
      padding:var(--space-2) var(--space-3);border-radius:var(--radius-sm);background:var(--color-bg-2);color:var(--color-text-2);font-size:var(--font-sm);
    }
    .composer{
      width:min(1040px,calc(100% - 56px));min-height:68px;margin:0 auto;padding:var(--space-3);
      display:flex;align-items:flex-end;gap:var(--space-2);border:1px solid var(--color-border);
      border-radius:var(--radius-md);background:var(--color-bg-1);box-shadow:var(--shadow-md);
    }
    .upload{
      width:38px;height:38px;flex:0 0 38px;border:1px solid var(--color-border);
      border-radius:var(--radius-sm);background:var(--color-bg-1);color:var(--color-text-2);
      display:grid;place-items:center;transition:color var(--transition-fast),background var(--transition-fast);
    }
    .upload:hover{color:var(--color-primary);background:var(--color-bg-2)}
    .upload svg{width:18px;height:18px}
    .composer textarea{
      min-width:0;min-height:38px;max-height:84px;flex:1;padding:var(--space-2) var(--space-1);
      resize:none;border:0;outline:0;background:transparent;color:var(--color-text-1);
      font-size:var(--font-base);line-height:var(--line-height-normal);
    }
    .composer textarea::placeholder{color:var(--color-text-3)}
    .send{
      width:40px;height:40px;flex:0 0 40px;border:0;border-radius:50%;
      color:var(--color-text-white);background:var(--color-primary);
      display:grid;place-items:center;transition:filter var(--transition-fast);
    }
    .send:hover{filter:brightness(.95)}
    .send svg{width:17px;height:17px}
    .toast{
      position:fixed;left:calc(50% + 110px);top:86px;z-index:20;
      padding:var(--space-2) var(--space-4);border-radius:var(--radius-sm);background:var(--color-text-1);color:var(--color-text-white);
      box-shadow:var(--shadow-md);opacity:0;
      transform:translate(-50%,-8px);pointer-events:none;transition:opacity var(--transition-normal),transform var(--transition-normal);
      font-size:var(--font-sm);
    }
    .toast.show{opacity:1;transform:translate(-50%,0)}
    @media(max-width:1300px){
      .stage{width:calc(100% - 40px)}
      .brief-grid{grid-template-columns:1fr 1fr}
      .type-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
  </style>
</head>

  <aside class="sidebar">
    <div class="brand">
      <div class="logo">复</div>
      <div class="brand-copy"><b>国家儿童医学中心</b><span>复旦大学附属儿科医院</span></div>

      <div class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/><path d="M9 9v.01"/><path d="M9 13v.01"/><path d="M9 17v.01"/></svg></span>空间管理<span class="caret"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></span></div>
      <div class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg></span>物资管理<span class="caret"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></span></div>

      <div class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>师生管理<span class="caret"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></span></div>

    <div class="user"><div class="avatar">王</div><div><b>王院长</b><small>超级管理员</small></div></div>

  <main class="main">
    <header class="topbar">
      <button class="back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>　返回</button>
      <div class="business-tabs">
        <button class="business-tab active">技能中心课程</button>
        <button class="business-tab">临床教学活动</button>
      </div>
      <span class="step">步骤 1 / 4</span>
    </header>

    <div class="stage">
      <section class="hero">
        <h1>创建课程</h1>
        <p>选择课程范围、课程类型与教学框架，也可以在下方补充具体需求</p>
        <div class="scope-tabs" id="scopeTabs">
          <button class="scope active" data-scope="单次课程">单次课程</button>
          <button class="scope" data-scope="专项课程">专项课程</button>
          <button class="scope" data-scope="纵向课程">纵向课程</button>
        </div>
      </section>

      <section class="section">
        <div class="section-head">
          <div><h2>选择课程类型</h2><p id="typeHelp">单次课程请选择一种课程类型</p></div>
          <span class="selection-note" id="typeNote">已选择：临床技术性技能课程</span>
        </div>
        <div class="type-grid" id="typeGrid">
          <button class="type-card active primary" data-type="临床技术性技能课程">
            <span class="type-role">主类型</span><span class="type-icon">技</span>
            <span class="type-text"><strong>临床技术性技能课程</strong><small>操作规范、技能示教与刻意练习</small></span>
            <span class="type-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
          </button>
          <button class="type-card" data-type="临床非技术性技能课程">
            <span class="type-role">主类型</span><span class="type-icon">沟</span>
            <span class="type-text"><strong>临床非技术性技能课程</strong><small>沟通、协作、领导与临床决策</small></span>
            <span class="type-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
          </button>
          <button class="type-card" data-type="综合情境模拟课程">
            <span class="type-role">主类型</span><span class="type-icon">景</span>
            <span class="type-text"><strong>综合情境模拟课程</strong><small>复杂情境、团队训练与结构化复盘</small></span>
            <span class="type-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
          </button>
          <button class="type-card" data-type="通识课程">
            <span class="type-role">主类型</span><span class="type-icon">通</span>
            <span class="type-text"><strong>通识课程</strong><small>共同基础、教学素养与普适能力</small></span>
            <span class="type-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
          </button>
        </div>

        <div class="brief" id="briefPanel">
          <div class="brief-title"><b id="briefTitle">专项课程基本信息</b><span>授课对象将关联难度、目标与框架建议</span></div>
          <div class="brief-grid">
            <div class="field"><label>课程名称</label><input id="courseName" placeholder="请输入课程名称"></div>
            <div class="field"><label>授课对象</label>
              <select id="audience">
                <option>住培一年级学员</option><option>住培二至三年级学员</option>
                <option>专培医师</option><option>新任带教教师</option><option>模拟教学导师</option>
              </select>
            </div>
            <div class="field"><label>建议难度</label>
              <select id="difficulty"><option>入门</option><option>进阶</option><option>高级</option></select>
            </div>
            <div class="field"><label>培养目标</label><input id="goal" value="建立规范流程和基础临床技能"></div>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="section-head">
          <div><h2>选择教学框架</h2><p id="frameworkHelp">单次课程选择一个主要教学框架</p></div>
          <span class="selection-note" id="frameworkNote">已选择：BOPPPS</span>
        </div>
        <div class="framework-grid" id="frameworkGrid">
          <button class="framework active" data-framework="BOPPPS">
            <span class="badge">推荐</span>
            <div class="framework-preview">
              <div class="framework-code">BOPPPS</div><div class="framework-sub">六环节参与式教学设计</div>
              <div class="flow"><i></i><i></i><i></i><i></i><i></i><i></i></div>
            </div>
            <div class="framework-meta"><div><strong>BOPPPS</strong><small>适合结构清晰的单次课程</small></div><span class="framework-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span></div>
          </button>
          <button class="framework" data-framework="TBL">
            <div class="framework-preview">
              <div class="framework-code">TBL</div><div class="framework-sub">团队式学习</div>
              <div class="dots"><i></i><i></i><i></i></div>
            </div>
            <div class="framework-meta"><div><strong>TBL</strong><small>准备度测试与团队应用</small></div><span class="framework-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span></div>
          </button>
          <button class="framework" data-framework="CBL">
            <div class="framework-preview">
              <div class="framework-code">CBL</div><div class="framework-sub">案例式学习</div>
              <div class="tiles"><i></i><i></i><i></i><i></i></div>
            </div>
            <div class="framework-meta"><div><strong>CBL</strong><small>围绕临床案例分析与决策</small></div><span class="framework-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span></div>
          </button>
          <button class="framework" data-framework="PBL">
            <div class="framework-preview">
              <div class="framework-code">PBL</div><div class="framework-sub">问题式学习</div>
              <div class="flow"><i></i><i></i><i></i><i></i></div>
            </div>
            <div class="framework-meta"><div><strong>PBL</strong><small>问题驱动与自主探究</small></div><span class="framework-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span></div>
          </button>

        </div>
      </section>
    </div>
  </main>
</div>

<div class="composer-shell">
  <div class="file-chip" id="fileChip"></div>
  <div class="composer">
    <button class="upload" id="uploadButton" title="上传教案"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg></button>
    <input type="file" id="fileInput" hidden accept=".doc,.docx,.pdf,.ppt,.pptx">
    <textarea id="prompt" rows="1" placeholder="补充课程主题、授课对象、难度或其他要求"></textarea>
    <button class="send" id="sendButton" title="发送"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg></button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  const state={
    scope:"单次课程",
    types:new Set(["临床技术性技能课程"]),
    primaryType:"临床技术性技能课程",
    frameworks:new Set(["BOPPPS"])
  };
  const profiles={
    "住培一年级学员":["入门","建立规范流程和基础临床技能","BOPPPS"],
    "住培二至三年级学员":["进阶","提升临床推理、沟通与团队协作","CBL"],
    "专培医师":["高级","解决复杂临床问题并形成独立决策能力","TBL"],
    "新任带教教师":["入门","掌握基本教学设计与课堂组织","BOPPPS"],
    "模拟教学导师":["高级","设计复杂情境并实施高质量引导与复盘","PBL"]
  };
  const $=id=>document.getElementById(id);
  function toast(text){
    $("toast").textContent=text;$("toast").classList.add("show");
    clearTimeout(window.toastTimer);window.toastTimer=setTimeout(()=>$("toast").classList.remove("show"),2100);
  }
  function syncTypeUI(){
    document.querySelectorAll(".type-card").forEach(card=>{
      const value=card.dataset.type;
      card.classList.toggle("active",state.types.has(value));
      card.classList.toggle("primary",value===state.primaryType);
    });
    const values=[...state.types];
    $("typeNote").textContent=(state.scope==="单次课程"?"已选择：":"包含：")+values.join("、");
  }
  function syncFrameworkUI(){
    document.querySelectorAll(".framework").forEach(card=>{
      card.classList.toggle("active",state.frameworks.has(card.dataset.framework));
    });
    $("frameworkNote").textContent=(state.scope==="单次课程"?"已选择：":"已选框架：")+[...state.frameworks].join("、");
  }
  function setScope(scope){
    state.scope=scope;
    document.querySelectorAll(".scope").forEach(x=>x.classList.toggle("active",x.dataset.scope===scope));
    const isSingle=scope==="单次课程";
    $("briefPanel").classList.toggle("show",!isSingle);
    $("briefTitle").textContent=scope+"基本信息";
    $("typeHelp").textContent=isSingle?"单次课程请选择一种课程类型":
      scope==="专项课程"?"请选择主课程类型，可补充其他课程类型":"请选择培养体系包含的课程类型，可多选";
    $("frameworkHelp").textContent=isSingle?"单次课程选择一个主要教学框架":"可选择多个默认框架，各课次后续仍可分别调整";
    if(isSingle){
      state.types=new Set([state.primaryType]);
      state.frameworks=new Set([[...state.frameworks][0]||"BOPPPS"]);
    }
    syncTypeUI();syncFrameworkUI();
  }
  $("scopeTabs").onclick=e=>{
    const btn=e.target.closest(".scope");if(btn)setScope(btn.dataset.scope);
  };
  $("typeGrid").onclick=e=>{
    const card=e.target.closest(".type-card");if(!card)return;
    const value=card.dataset.type;
    if(state.scope==="单次课程"){
      state.primaryType=value;state.types=new Set([value]);
    }else if(state.scope==="专项课程"){
      if(!state.types.has(value)){state.types.add(value)}
      else if(value!==state.primaryType){state.types.delete(value)}
      if(!state.types.has(state.primaryType))state.primaryType=value;
      if(e.shiftKey||state.types.size===1)state.primaryType=value;
    }else{
      state.types.has(value)&&state.types.size>1?state.types.delete(value):state.types.add(value);
      if(!state.types.has(state.primaryType))state.primaryType=[...state.types][0];
    }
    syncTypeUI();
  };
  $("frameworkGrid").onclick=e=>{
    const card=e.target.closest(".framework");if(!card)return;
    const value=card.dataset.framework;
    if(state.scope==="单次课程")state.frameworks=new Set([value]);
    else state.frameworks.has(value)&&state.frameworks.size>1?state.frameworks.delete(value):state.frameworks.add(value);
    syncFrameworkUI();
  };
  $("audience").onchange=()=>{
    const p=profiles[$("audience").value];
    $("difficulty").value=p[0];$("goal").value=p[1];
    if(state.scope==="单次课程")state.frameworks=new Set([p[2]]);
    else state.frameworks.add(p[2]);
    syncFrameworkUI();toast("已根据授课对象更新难度、目标与框架建议");
  };
  $("uploadButton").onclick=()=>$("fileInput").click();
  $("fileInput").onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    $("fileChip").textContent="已上传："+file.name;$("fileChip").style.display="block";
    toast("文件已加入，将结合材料整理课程信息");
  };
  $("sendButton").onclick=()=>{
    const text=$("prompt").value.trim();if(!text){toast("请先描述课程需求");return}
    if(/纵向/.test(text))setScope("纵向课程");
    else if(/专项/.test(text))setScope("专项课程");
    ["BOPPPS","TBL","CBL","PBL"].forEach(name=>{
      if(text.toUpperCase().includes(name)){
        if(state.scope==="单次课程")state.frameworks=new Set([name]);else state.frameworks.add(name);
      }
    });
    if(/非技术|沟通|协作/.test(text))state.types.add("临床非技术性技能课程");
    else if(/情境|模拟/.test(text))state.types.add("综合情境模拟课程");
    else if(/通识/.test(text))state.types.add("通识课程");
    else if(/操作|技能/.test(text))state.types.add("临床技术性技能课程");
    if(state.scope==="单次课程"){
      const last=[...state.types].pop();state.primaryType=last;state.types=new Set([last]);
    }
    const title=text.match(/[《“](.*?)[》”]/);if(title)$("courseName").value=title[1];
    syncTypeUI();syncFrameworkUI();$("prompt").value="";
    toast("已整理需求，请确认课程类型与教学框架");
  };
  $("prompt").onkeydown=e=>{
    if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();$("sendButton").click()}
  };
  setScope("单次课程");
</script>
</body>
</html>
